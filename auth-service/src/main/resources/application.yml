# ============================================================
# AUTH SERVICE - Application Configuration
# ============================================================
server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service

  # WHY Spring Cloud Kubernetes Config Integration:
  # Reads configuration from a Kubernetes ConfigMap named
  # 'auth-service-config' in the 'crew-horizon' namespace.
  # This replaces the need for a separate Config Server,
  # reducing operational complexity.
  cloud:
    kubernetes:
      config:
        enabled: true
        name: auth-service-config
        namespace: crew-horizon
      reload:
        enabled: true
        mode: polling
        period: 60000

  # ============================================================
  # Database Configuration
  # ============================================================
  # WHY PostgreSQL (not MySQL):
  # PostgreSQL offers superior JSON support, full ACID compliance,
  # and better support for concurrent writes — important for an
  # airline system with many simultaneous crew state updates.
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-service:5432/auth_db}
    username: ${DB_USERNAME:crew_horizon_user}
    password: ${DB_PASSWORD:changeme_in_k8s_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      # WHY connection pool sizing:
      # Max pool size = (2 * CPU_cores) + effective_spindle_count
      # For auth service: small pool is fine (auth is fast, infrequent)
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # WHY connection test query:
      # Detects stale connections before they're used,
      # preventing "connection closed" errors in production.
      connection-test-query: SELECT 1

  # ============================================================
  # JPA / Hibernate Configuration
  # ============================================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # WHY validate (not update) in production:
      # 'update' can silently alter schema in unexpected ways.
      # 'validate' ensures Hibernate schema matches DB schema —
      # any mismatch throws on startup (fail-fast principle).
      # Schema migrations are handled by Flyway/Liquibase.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        # WHY batch size 20:
        # Hibernate batches INSERT/UPDATE statements, reducing
        # N individual DB calls to N/20 batch calls. Critical
        # for bulk user operations (onboarding multiple crew members).
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        # Second-level cache disabled for auth entities
        # WHY: User data changes frequently (last login, failed attempts)
        # Caching would return stale security state — unacceptable.
        cache:
          use_second_level_cache: false

  # ============================================================
  # Redis Configuration
  # ============================================================
  data:
    redis:
      host: ${REDIS_HOST:redis-service}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default TTL

  # ============================================================
  # Flyway Database Migration
  # ============================================================
  # WHY Flyway (not Hibernate auto-ddl):
  # Flyway provides versioned, trackable schema migrations.
  # Every DB change is a SQL script tracked in version control.
  # This enables: rollback, auditing, and environment parity.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ============================================================
# JWT Configuration
# ============================================================
jwt:
  secret: ${JWT_SECRET:crew-horizon-jwt-secret-key-minimum-32-characters-required}
  access-token:
    expiration-ms: ${JWT_ACCESS_EXPIRY_MS:900000}     # 15 minutes
  refresh-token:
    expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days

# ============================================================
# Spring Boot Actuator
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: auth-service
      environment: ${ENVIRONMENT:production}

# ============================================================
# OpenAPI Documentation
# ============================================================
# WHY OpenAPI (Swagger):
# Self-documenting APIs reduce onboarding time for developers
# integrating with the auth service. In airline systems, multiple
# teams (mobile, operations portal, scheduling) consume this API.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.crewhorizon.authservice: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"auth-service","logger":"%logger{36}","message":"%m","requestId":"%X{requestId}"}%n'
