# ============================================================
# Kubernetes Secrets
# ============================================================
# WHAT: Stores sensitive configuration values (passwords, keys)
#       separately from non-sensitive ConfigMaps.
#
# WHY K8s Secrets (not ConfigMaps for sensitive data):
#   1. Access control: Secrets can be restricted to specific pods
#      via RBAC while ConfigMaps are broadly readable.
#   2. Encryption at rest: K8s Secrets can be encrypted at rest
#      via EncryptionConfig or KMS integration (AWS KMS, GCP CKMS).
#   3. Integration: Vault, AWS Secrets Manager, and Azure Key Vault
#      can sync secrets INTO K8s Secrets automatically.
#
# ⚠️ IMPORTANT: DO NOT commit real secret values to Git.
#   These are placeholder (base64 of "changeme") values.
#   In production, use External Secrets Operator or Vault Agent
#   to inject real values from a secrets management system.
#
# HOW TO GENERATE REAL BASE64:
#   echo -n "your-actual-secret-value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: crew-horizon-secrets
  namespace: crew-horizon
  annotations:
    # Annotation for External Secrets Operator (if used)
    secret-store: vault-backend
type: Opaque
data:
  # JWT signing key (minimum 32 chars for HS256)
  # Generate: openssl rand -base64 48 | base64
  JWT_SECRET: Y2hhbmdlbWUtaW4tcHJvZHVjdGlvbi1taW5pbXVtLTMyLWNoYXJzLXJlcXVpcmVk

  # Database password
  DB_PASSWORD: Y2hhbmdlbWU=

  # Redis password (if Redis AUTH is enabled)
  REDIS_PASSWORD: ""

  # SMTP credentials for notification-service
  SMTP_PASSWORD: Y2hhbmdlbWU=

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: crew-horizon
type: Opaque
data:
  # PostgreSQL superuser password
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # Application user password
  APP_PASSWORD: Y2hhbmdlbWU=
