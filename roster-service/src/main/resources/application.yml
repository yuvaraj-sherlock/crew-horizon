# ============================================================
# ROSTER SERVICE - Application Configuration
# ============================================================
server:
  port: ${SERVER_PORT:8084}
spring:
  application:
    name: roster-service
  cloud:
    kubernetes:
      config:
        enabled: true
        name: roster-service-config
        namespace: crew-horizon
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-service:5432/roster_db}
    username: ${DB_USERNAME:crew_horizon_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis-service}
      port: ${REDIS_PORT:6379}
jwt:
  secret: ${JWT_SECRET:crew-horizon-jwt-secret-key-minimum-32-characters-required}

# WHY timeout configuration for inter-service calls:
# Roster service calls both crew-service and flight-service.
# Without timeouts, a slow downstream service would hold
# threads indefinitely, leading to thread pool exhaustion.
services:
  crew-service:
    url: ${CREW_SERVICE_URL:lb://crew-service}
    timeout-ms: 3000
  flight-service:
    url: ${FLIGHT_SERVICE_URL:lb://flight-service}
    timeout-ms: 3000

resilience4j:
  circuitbreaker:
    instances:
      crew-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedCallsInHalfOpenState: 3
      flight-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
  retry:
    instances:
      crew-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      flight-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: roster-service
logging:
  level:
    com.crewhorizon.rosterservice: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"roster-service","message":"%m"}%n'
