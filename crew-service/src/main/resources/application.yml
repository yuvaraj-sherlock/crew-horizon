# ============================================================
# CREW SERVICE - Application Configuration
# ============================================================
server:
  port: ${SERVER_PORT:8082}
spring:
  application:
    name: crew-service
  cloud:
    kubernetes:
      config:
        enabled: true
        name: crew-service-config
        namespace: crew-horizon
      reload:
        enabled: true
        mode: polling
        period: 60000
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-service:5432/crew_db}
    username: ${DB_USERNAME:crew_horizon_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: 3
      connection-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        jdbc.batch_size: 20
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis-service}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      # WHY different TTLs per cache:
      # crew-members detail: 10min (changes infrequently)
      # crew-members-list: 2min (updated on any crew change)
      time-to-live: 600000
    cache-names:
      - crew-members
      - crew-members-list
jwt:
  secret: ${JWT_SECRET:crew-horizon-jwt-secret-key-minimum-32-characters-required}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: crew-service
      environment: ${ENVIRONMENT:production}
springdoc:
  api-docs:
    path: /v3/api-docs
logging:
  level:
    com.crewhorizon.crewservice: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"crew-service","logger":"%logger{36}","message":"%m"}%n'
