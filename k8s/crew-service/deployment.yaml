---
# ============================================================
# CREW SERVICE - Kubernetes Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crew-service
  namespace: crew-horizon
  labels:
    app: crew-service
    version: "1.0.0"
    app.kubernetes.io/name: crew-service
    app.kubernetes.io/part-of: crew-horizon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crew-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: crew-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: crew-horizon-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: crew-service
      containers:
        - name: crew-service
          image: ghcr.io/your-org/crew-horizon/crew-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: crew-service-config
            - secretRef:
                name: crew-horizon-secrets
          # WHY higher memory for crew-service:
          # Crew service caches crew profiles in Redis AND
          # holds JPA session caches. More memory = fewer GC pauses
          # during roster-building queries.
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          env:
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=75.0
                -XX:+UseG1GC
                -XX:+ExitOnOutOfMemoryError
                -Djava.security.egd=file:/dev/./urandom
---
apiVersion: v1
kind: Service
metadata:
  name: crew-service
  namespace: crew-horizon
  labels:
    app: crew-service
spec:
  selector:
    app: crew-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  type: ClusterIP
---
# WHY PodDisruptionBudget:
# During cluster maintenance (node drain), K8s might terminate
# all pods simultaneously. PDB ensures at least 1 pod is always
# running during voluntary disruptions, preventing service outage.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crew-service-pdb
  namespace: crew-horizon
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: crew-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crew-service-hpa
  namespace: crew-horizon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crew-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
