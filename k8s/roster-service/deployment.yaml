# ============================================================
# ROSTER SERVICE - Kubernetes Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roster-service
  namespace: crew-horizon
  labels:
    app: roster-service
    version: "1.0.0"
    app.kubernetes.io/name: roster-service
    app.kubernetes.io/part-of: crew-horizon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roster-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: roster-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/actuator/prometheus"

    spec:
      serviceAccountName: crew-horizon-sa

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: roster-service

      containers:
        - name: roster-service
          image: ghcr.io/your-org/crew-horizon/roster-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http

          envFrom:
            - configMapRef:
                name: roster-service-config
            - secretRef:
                name: crew-horizon-secrets

          # 🔥 Heavy service → more memory like crew-service
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 10

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 30
            periodSeconds: 10

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          env:
            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=75.0
                -XX:+UseG1GC
                -XX:+ExitOnOutOfMemoryError
                -Djava.security.egd=file:/dev/./urandom

---
apiVersion: v1
kind: Service
metadata:
  name: roster-service
  namespace: crew-horizon
  labels:
    app: roster-service
spec:
  selector:
    app: roster-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
  type: ClusterIP

---
# 🔥 Critical service → add PDB (same as crew-service)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roster-service-pdb
  namespace: crew-horizon
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: roster-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roster-service-hpa
  namespace: crew-horizon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: roster-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70