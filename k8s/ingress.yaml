---
# ============================================================
# CREW HORIZON - Kubernetes Ingress
# ============================================================
# WHAT: Exposes the API Gateway to external traffic via an
#       NGINX Ingress Controller with TLS termination.
#
# WHY Ingress (not LoadBalancer Service):
#       LoadBalancer Service = one external IP per service.
#       With 6 microservices, that's 6 external IPs = 6 cloud
#       load balancers = expensive and complex DNS management.
#
#       Ingress = ONE external IP, ONE load balancer, routes
#       traffic to any service based on path/host rules.
#       Much more cost-effective for microservices.
#
# WHY path-based routing to API Gateway (not to each service):
#       The Ingress routes to the API Gateway, which then routes
#       to individual services. This maintains the gateway pattern:
#       single entry point, centralized auth, rate limiting.
#
# WHY nginx.ingress.kubernetes.io/ssl-redirect:
#       Forces all HTTP traffic to HTTPS. Unencrypted crew data
#       (schedules, names, destinations) is unacceptable
#       in an airline operations system.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crew-horizon-ingress
  namespace: crew-horizon
  annotations:
    # Use NGINX ingress controller
    kubernetes.io/ingress.class: "nginx"

    # WHY SSL redirect: Force HTTPS for all traffic
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # WHY proxy timeouts: Roster building can take up to 30s
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"

    # WHY proxy-buffer-size: Handle large JWT tokens in headers
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"

    # TLS certificate from cert-manager (Let's Encrypt)
    # WHY cert-manager: Automates TLS certificate provisioning and renewal
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # WHY limit request size: Prevent oversized payloads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - api.crew-horizon.com
      secretName: crew-horizon-tls-cert

  rules:
    - host: api.crew-horizon.com
      http:
        paths:
          # Route ALL API traffic to the API Gateway
          # WHY single catch-all route to gateway:
          # The gateway is responsible for all routing decisions.
          # Ingress only handles external access; routing logic
          # lives in the gateway's GatewayRouteConfig.java
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

---
# ============================================================
# Network Policy - Restrict inter-service traffic
# ============================================================
# WHAT: Defines which pods can communicate with which.
#
# WHY Network Policies:
#       Without network policies, ANY pod in the cluster can
#       reach ANY other pod. In a security-conscious airline
#       system, we enforce "zero-trust networking":
#       - Only API Gateway can call crew/flight/roster services
#       - Services can only call their allowed dependencies
#       - No service can call the auth DB directly (except auth-service)
#
# This prevents: Compromised crew-service pod from directly
# querying the auth DB to steal user credentials.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: crew-horizon
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept traffic from Ingress Controller only
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 8080
  egress:
    # Allow outbound to crew-horizon namespace services
    - to:
        - namespaceSelector:
            matchLabels:
              name: crew-horizon
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
