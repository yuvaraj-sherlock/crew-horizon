---
# ============================================================
# CREW HORIZON - Kubernetes Secrets
# ============================================================
# WHAT: Template for Kubernetes Secrets storing sensitive
#       credentials for CREW Horizon services.
#
# ⚠️  IMPORTANT SECURITY NOTICE:
#       This file contains PLACEHOLDERS, not real secrets.
#       NEVER commit real secret values to source control.
#
# WHY Kubernetes Secrets over ConfigMaps for credentials:
#       1. K8s Secrets are base64-encoded (though NOT encrypted
#          by default — enable etcd encryption at rest in production)
#       2. RBAC can restrict Secret access at namespace level
#          while allowing broader ConfigMap access
#       3. Secrets can be rotated without pod restarts
#          (using secret volume mounts, not env vars)
#       4. Integration with external secret managers:
#          - AWS Secrets Manager via External Secrets Operator
#          - HashiCorp Vault via Vault Agent Injector
#          - Azure Key Vault via Azure Key Vault Provider
#
# PRODUCTION RECOMMENDATION:
#       Use External Secrets Operator (ESO) to sync secrets
#       from HashiCorp Vault / AWS Secrets Manager into K8s Secrets
#       automatically. This avoids storing secrets in Git entirely.
#
# HOW TO CREATE REAL SECRETS:
#       kubectl create secret generic crew-horizon-secrets \
#         --from-literal=jwt-secret="$(openssl rand -base64 48)" \
#         --from-literal=db-password="$(openssl rand -base64 32)" \
#         -n crew-horizon
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: crew-horizon-secrets
  namespace: crew-horizon
  labels:
    app.kubernetes.io/part-of: crew-horizon
type: Opaque
# Values are base64-encoded. In production, use External Secrets Operator.
# To encode: echo -n "value" | base64
stringData:
  # JWT signing secret — MUST be at least 32 characters (256 bits for HS256)
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_SECRET_MIN_32_CHARS"

  # PostgreSQL credentials
  DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  DB_ROOT_PASSWORD: "REPLACE_WITH_ROOT_PASSWORD"

  # Redis auth (if enabled)
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"

  # SMTP credentials for notifications
  SMTP_USERNAME: "REPLACE_WITH_SMTP_USER"
  SMTP_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"

---
# OAuth2 client credentials for service-to-service calls
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-client-secrets
  namespace: crew-horizon
type: Opaque
stringData:
  CLIENT_ID: "crew-horizon-internal"
  CLIENT_SECRET: "REPLACE_WITH_OAUTH2_CLIENT_SECRET"

---
# PostgreSQL password secret (for DB StatefulSet)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: crew-horizon
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"
  POSTGRES_USER: "crew_horizon_user"
