# ============================================================
# CREW HORIZON - GitHub Actions CI/CD Pipeline
# ============================================================
# WHAT: Automated pipeline that builds, tests, containerizes,
#       and deploys all CREW Horizon microservices on every
#       push to main or pull request.
#
# WHY GitHub Actions (not Jenkins):
#       1. NO INFRASTRUCTURE: No Jenkins server to maintain/patch
#       2. GITOPS NATIVE: Pipeline config lives in the same repo
#          as the code — version controlled, reviewed, audited
#       3. MATRIX BUILDS: Native support for building multiple
#          services in parallel (significant time savings)
#       4. ECOSYSTEM: 10,000+ pre-built actions for common tasks
#          (Docker, Kubernetes, Maven, security scanning)
#
# PIPELINE STAGES:
#   1. Code Quality    — Linting, static analysis
#   2. Unit Tests      — Fast, isolated tests (no external deps)
#   3. Integration Tests — Tests with real DB (Testcontainers)
#   4. Security Scan   — OWASP dependency check, Trivy image scan
#   5. Build & Push    — Docker image build + push to registry
#   6. Deploy Staging  — Auto-deploy to staging on main branch
#   7. Deploy Prod     — Manual approval gate → production
# ============================================================

name: CREW Horizon CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

# WHY concurrency group:
# Prevents multiple workflow runs for the same PR from running
# simultaneously. New pushes cancel in-progress runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/crew-horizon
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m'

jobs:

  # ──────────────────────────────────────────
  # JOB 0: Detect Changed Services
  # ──────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.detect.outputs.api-gateway }}
      auth-service: ${{ steps.detect.outputs.auth-service }}
      crew-service: ${{ steps.detect.outputs.crew-service }}
      flight-service: ${{ steps.detect.outputs.flight-service }}
      roster-service: ${{ steps.detect.outputs.roster-service }}
      notification-service: ${{ steps.detect.outputs.notification-service }}
      any-changed: ${{ steps.detect.outputs.any-changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff

      # WHY detect changes:
      # Only runs tests/builds/deploys for services with actual code changes.
      # If only crew-service changed, roster-service is skipped entirely.
      # This saves 66% of CI time on single-service changes.
      - name: Detect changed services
        id: detect
        run: |
          # Get list of changed files compared to main branch
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          else
            git diff --name-only HEAD^ HEAD > /tmp/changed_files.txt
          fi

          echo "=== Changed files ===" 
          cat /tmp/changed_files.txt

          # Check each service
          declare -A services
          services[api-gateway]=false
          services[auth-service]=false
          services[crew-service]=false
          services[flight-service]=false
          services[roster-service]=false
          services[notification-service]=false

          # If key files change, rebuild everything
          if grep -qE '^pom\.xml$|^\.github/workflows/ci-cd\.yml$|^docker-compose\.yml$' /tmp/changed_files.txt; then
            echo "=== Root-level file changed, building ALL services ==="
            for svc in "${!services[@]}"; do
              services[$svc]=true
            done
          else
            # Otherwise, only rebuild changed services
            while IFS= read -r file; do
              for svc in "${!services[@]}"; do
                if [[ "$file" =~ ^$svc/ ]]; then
                  services[$svc]=true
                  echo "✅ $svc changed"
                fi
              done
            done < /tmp/changed_files.txt
          fi

          # Output results
          any_changed=false
          for svc in "${!services[@]}"; do
            echo "$svc=${services[$svc]}" >> $GITHUB_OUTPUT
            if [ "${services[$svc]}" = "true" ]; then
              any_changed=true
            fi
          done
          echo "any-changed=$any_changed" >> $GITHUB_OUTPUT

          # Debug output
          echo "=== Detection Results ==="
          cat $GITHUB_OUTPUT

  # ──────────────────────────────────────────
  # JOB 1: Code Quality Checks
  # ──────────────────────────────────────────
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for SonarQube blame info

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          # WHY cache: Maven downloads ~500MB of dependencies.
          # Caching reduces pipeline time from 5 min to 30s.
          cache: maven

      - name: Run checkstyle
        run: mvn checkstyle:check -B --no-transfer-progress

      - name: Run SpotBugs
        run: mvn spotbugs:check -B --no-transfer-progress

  # ──────────────────────────────────────────
  # JOB 2: Test Matrix (Parallel per service)
  # ──────────────────────────────────────────
  test:
    name: Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [code-quality, detect-changes]

    # WHY conditional: Skip tests for services with no code changes
    if: needs.detect-changes.outputs[matrix.service] == 'true'

    # WHY matrix strategy:
    # Each service's tests run IN PARALLEL instead of sequentially.
    # 6 services × 3 min each = 3 min total (vs 18 min sequential).
    strategy:
      fail-fast: false  # Don't cancel other services if one fails
      matrix:
        service:
          - api-gateway
          - auth-service
          - crew-service
          - flight-service
          - roster-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # WHY Testcontainers for integration tests:
      # Integration tests need real PostgreSQL and Redis.
      # Testcontainers spins them up as Docker containers
      # inside the test — no external infrastructure needed.
      # Tests are fully self-contained and reproducible.
      - name: Run tests - ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn test verify \
            -B \
            --no-transfer-progress \
            -Dspring.profiles.active=test
        env:
          # WHY TESTCONTAINERS_RYUK_DISABLED:
          # GitHub Actions runners may not have full Docker
          # daemon access. Disabling Ryuk avoids cleanup issues.
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/

  # ──────────────────────────────────────────
  # JOB 3: Security Scanning
  # ──────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.any-changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # WHY OWASP Dependency Check:
      # Scans all Maven dependencies against the NVD (National
      # Vulnerability Database) for known CVEs. Prevents shipping
      # a microservice with a Log4Shell-level vulnerability.
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -B \
            --no-transfer-progress \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=owasp-suppressions.xml
        continue-on-error: true  # Report but don't block on first run

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html

  # ──────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, security-scan, detect-changes]
    # Only push if this specific service changed
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs[matrix.service] == 'true'

    permissions:
      contents: read
      packages: write  # Needed to push to GHCR

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - crew-service
          - flight-service
          - roster-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # WHY Docker Buildx + QEMU:
      # Enables building multi-architecture images (amd64 + arm64).
      # arm64 support means images run on Apple M1/M2 development
      # machines AND on AWS Graviton (arm64) production nodes
      # (30% cheaper than x86 instances).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Maven artifact
        run: |
          cd ${{ matrix.service }}
          mvn package -DskipTests -B --no-transfer-progress

      # WHY extract image metadata:
      # Generates appropriate tags:
      # - branch builds: :develop, :main
      # - PR builds: :pr-123
      # - tag builds: :1.2.3, :latest
      # - all builds: :<commit-sha> (for exact traceability)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: true
          # WHY multi-platform:
          # Supports both x86 cloud instances and ARM dev machines
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # WHY cache-from/cache-to:
          # Docker layer cache stored in GitHub Container Registry.
          # Subsequent builds reuse unchanged layers — 70% faster builds.
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache,mode=max

      # WHY Trivy image scan AFTER build:
      # Scans the ACTUAL Docker image that will be deployed
      # (not just the JAR dependencies) for OS-level CVEs
      # in the Alpine base image and JRE.
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail build; report to Security tab

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ──────────────────────────────────────────
  # JOB 5: Deploy to Staging
  # ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, detect-changes]
    if: |
      github.ref == 'refs/heads/main' && 
      needs.detect-changes.outputs.any-changed == 'true'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Update image tags in K8s manifests (only changed services)
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          
          # Only update services that actually changed
          for svc in api-gateway auth-service crew-service flight-service roster-service notification-service; do
            if [ "${{ needs.detect-changes.outputs[svc] }}" == "true" ]; then
              echo "🔄 Deploying $svc to staging..."
              kubectl set image deployment/$svc \
                $svc=${{ env.IMAGE_PREFIX }}/$svc:$IMAGE_TAG \
                -n crew-horizon-staging
            else
              echo "⏭️  Skipping $svc (no changes)"
            fi
          done

      # WHY rollout status check:
      # Pipeline fails if the deployment doesn't complete
      # successfully. Catches bad images before production.
      - name: Verify deployment rollout (only changed services)
        run: |
          for svc in api-gateway auth-service crew-service flight-service roster-service notification-service; do
            if [ "${{ needs.detect-changes.outputs[svc] }}" == "true" ]; then
              echo "✓ Checking $svc rollout..."
              kubectl rollout status deployment/$svc \
                -n crew-horizon-staging \
                --timeout=300s
            fi
          done

      - name: Run smoke tests
        run: |
          GATEWAY_URL="https://staging-api.crew-horizon.com"
          curl -f "$GATEWAY_URL/actuator/health" || exit 1
          echo "✅ Staging smoke tests passed"

  # ──────────────────────────────────────────
  # JOB 6: Deploy to Production (Manual Gate)
  # ──────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, detect-changes]
    if: |
      github.ref == 'refs/heads/main' && 
      needs.detect-changes.outputs.any-changed == 'true'
    # WHY 'environment: production':
    # GitHub Environments with required reviewers creates a
    # MANUAL APPROVAL GATE. A designated approver must click
    # "Approve" in GitHub UI before this job runs.
    # No code change can reach production without human review.
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Deploy to production with blue-green strategy (only changed services)
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          
          for svc in api-gateway auth-service crew-service flight-service roster-service notification-service; do
            if [ "${{ needs.detect-changes.outputs[svc] }}" == "true" ]; then
              echo "🚀 Deploying $svc to production..."
              kubectl set image deployment/$svc \
                $svc=${{ env.IMAGE_PREFIX }}/$svc:$IMAGE_TAG \
                -n crew-horizon

              # Wait for each service to complete rollout before moving to next
              kubectl rollout status deployment/$svc \
                -n crew-horizon \
                --timeout=600s

              echo "✅ $svc deployed successfully"
            else
              echo "⏭️  Skipping $svc (no changes)"
            fi
          done

      - name: Production smoke tests
        run: |
          GATEWAY_URL="https://api.crew-horizon.com"
          curl -f "$GATEWAY_URL/actuator/health" || exit 1
          echo "✅ Production deployment verified"

      # WHY notify on completion:
      # Operations team needs to know when production changes.
      # Slack notification provides instant visibility.
      - name: Notify Slack on deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ✅ CREW Horizon Production Deployment: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Services deployed: See workflow logs for details
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
