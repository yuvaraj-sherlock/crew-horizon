# ============================================================
# FLIGHT SERVICE - Application Configuration
# ============================================================
server:
  port: ${SERVER_PORT:8083}
spring:
  application:
    name: flight-service
  cloud:
    kubernetes:
      config:
        enabled: true
        name: flight-service-config
        namespace: crew-horizon
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-service:5432/flight_db}
    username: ${DB_USERNAME:crew_horizon_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: 3
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis-service}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 300000
jwt:
  secret: ${JWT_SECRET:crew-horizon-jwt-secret-key-minimum-32-characters-required}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: flight-service
logging:
  level:
    com.crewhorizon.flightservice: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"flight-service","message":"%m"}%n'
