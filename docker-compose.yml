# ============================================================
# Docker Compose — Local Development Environment
# ============================================================
# WHAT: Starts the complete CREW Horizon stack locally with
#       all infrastructure (PostgreSQL, Redis) and all 6
#       microservices.
#
# WHY Docker Compose for local development:
#   1. PARITY: Developers run the same tech stack as production
#      (same Postgres version, same Redis version) — eliminates
#      "works on my machine" bugs.
#   2. ISOLATION: All services run in a private bridge network
#      (crew-horizon-net). No port conflicts with other projects.
#   3. REPRODUCIBILITY: Any developer can run the full stack with
#      a single command: `docker compose up -d`
#
# USAGE:
#   Start all:      docker compose up -d
#   Start specific: docker compose up -d auth-service crew-service
#   View logs:      docker compose logs -f crew-service
#   Stop all:       docker compose down
#   Reset DBs:      docker compose down -v  (deletes volumes)
#
# WHY profiles:
#   --profile tools starts optional tools (pgAdmin, RedisInsight)
#   that developers can opt into but aren't required.
# ============================================================

version: "3.9"

networks:
  # WHY private bridge network:
  # Services communicate by name (e.g., postgres-service) within
  # this network. No external access except via explicit port mapping.
  crew-horizon-net:
    driver: bridge
    name: crew-horizon-network

volumes:
  postgres_data:
    name: crew-horizon-postgres-data
  redis_data:
    name: crew-horizon-redis-data

# ─── Infrastructure Services ─────────────────────────────────────────────────
services:

  postgres:
    image: postgres:16-alpine
    container_name: crew-horizon-postgres
    networks: [crew-horizon-net]
    # WHY name the container and use service name:
    # Spring Boot services reference 'postgres-service' in their
    # DB URL. The container_name doesn't matter for DNS within
    # the Docker network — the service name does.
    hostname: postgres-service
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"     # Exposed for local DB tools (DBeaver, pgAdmin)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k8s/configmaps/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: crew-horizon-redis
    hostname: redis-service
    networks: [crew-horizon-net]
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# ─── Microservices ────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      # WHY target builder for local: Faster local builds using
      # the already-compiled JAR from the build stage.
      target: runtime
    container_name: crew-horizon-auth
    networks: [crew-horizon-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8081"
      DB_URL: "jdbc:postgresql://postgres-service:5432/auth_db"
      DB_USERNAME: "crew_horizon_user"
      DB_PASSWORD: "devpassword"
      REDIS_HOST: "redis-service"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      JPA_DDL_AUTO: "update"    # WHY 'update' locally: Auto-creates schema on startup
      JPA_SHOW_SQL: "true"      # SQL logging for debugging (disabled in prod)
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "local"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=70.0 -Xss256k"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  crew-service:
    build:
      context: ./crew-service
      dockerfile: Dockerfile
      target: runtime
    container_name: crew-horizon-crew
    networks: [crew-horizon-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8082"
      DB_URL: "jdbc:postgresql://postgres-service:5432/crew_db"
      DB_USERNAME: "crew_horizon_user"
      DB_PASSWORD: "devpassword"
      REDIS_HOST: "redis-service"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      JPA_DDL_AUTO: "update"
      JPA_SHOW_SQL: "false"
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "local"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=70.0"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  flight-service:
    build:
      context: ./flight-service
      dockerfile: Dockerfile
      target: runtime
    container_name: crew-horizon-flight
    networks: [crew-horizon-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8083"
      DB_URL: "jdbc:postgresql://postgres-service:5432/flight_db"
      DB_USERNAME: "crew_horizon_user"
      DB_PASSWORD: "devpassword"
      REDIS_HOST: "redis-service"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      JPA_DDL_AUTO: "update"
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "local"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  roster-service:
    build:
      context: ./roster-service
      dockerfile: Dockerfile
      target: runtime
    container_name: crew-horizon-roster
    networks: [crew-horizon-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      crew-service:
        condition: service_healthy
      flight-service:
        condition: service_healthy
    environment:
      SERVER_PORT: "8084"
      DB_URL: "jdbc:postgresql://postgres-service:5432/roster_db"
      DB_USERNAME: "crew_horizon_user"
      DB_PASSWORD: "devpassword"
      REDIS_HOST: "redis-service"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      JPA_DDL_AUTO: "update"
      # WHY http:// (not lb://) in Docker Compose:
      # lb:// is a Spring Cloud LoadBalancer scheme for K8s service discovery.
      # In Docker Compose, service names resolve via Docker DNS directly.
      CREW_SERVICE_URL: "http://crew-service:8082"
      FLIGHT_SERVICE_URL: "http://flight-service:8083"
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "local"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      target: runtime
    container_name: crew-horizon-notification
    networks: [crew-horizon-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "8085"
      DB_URL: "jdbc:postgresql://postgres-service:5432/notification_db"
      DB_USERNAME: "crew_horizon_user"
      DB_PASSWORD: "devpassword"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      JPA_DDL_AUTO: "update"
      # WHY Mailhog for local email:
      # MailHog is a local SMTP server that captures all outgoing emails
      # and shows them in a web UI (localhost:8025).
      # No real emails are sent during local development.
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "local"
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      target: runtime
    container_name: crew-horizon-gateway
    networks: [crew-horizon-net]
    depends_on:
      auth-service:
        condition: service_healthy
      crew-service:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      REDIS_HOST: "redis-service"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-chars-required!"
      LOG_LEVEL: "DEBUG"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:4200"
      ENVIRONMENT: "local"
    ports:
      - "8080:8080"     # Main API entry point
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ─── Optional Developer Tools ─────────────────────────────────────────────────

  # WHY MailHog: Catches all emails sent by notification-service locally.
  # View captured emails at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: crew-horizon-mailhog
    networks: [crew-horizon-net]
    hostname: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles: [tools]   # Only starts with: docker compose --profile tools up

  # WHY pgAdmin: GUI for PostgreSQL schema inspection and query testing
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crew-horizon-pgadmin
    networks: [crew-horizon-net]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crew-horizon.local
      PGADMIN_DEFAULT_PASSWORD: devpassword
    ports:
      - "5050:80"
    profiles: [tools]

  # WHY RedisInsight: GUI for Redis cache inspection
  # Useful for debugging rate limiting and cache contents
  redis-insight:
    image: redis/redisinsight:latest
    container_name: crew-horizon-redis-insight
    networks: [crew-horizon-net]
    ports:
      - "5540:5540"
    profiles: [tools]
